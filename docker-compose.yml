version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://anac:anac@postgres:5432/anac_db
      - UPLOAD_DIR=/data/uploads
      - GENERATED_DIR=/data/generated
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENVIRONMENT=development
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - uploads:/data/uploads
      - generated:/data/generated
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anac
      POSTGRES_PASSWORD: anac
      POSTGRES_DB: anac_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anac -d anac_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  generated:
